<!doctype html>
<html lang="en">

<head>
  <title>Simple Shopping List</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Simple Shopping List">
  <!-- Icons -->
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/icons/icon-192x192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/icons/icon-512x512.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
  <!-- React Router Navigation SPA Fix -->
  <script>
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          });
        window.history.replaceState(
          null,
          null,
          decoded[0] + (decoded[1] ? "?" + decoded[1] : "") + l.hash
        );
      }
    })(window.location);
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
